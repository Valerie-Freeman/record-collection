<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Collection</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <header class="app-header">
      <h1>Collection</h1>
      <span id="record-count" class="record-count" aria-label="record count">0</span>
    </header>
    <main>
      <div class="search-bar">
        <input
          id="search-input"
          class="search-input"
          type="search"
          placeholder="Search artist or title"
          aria-label="Search artist or title"
          autocomplete="off"
        />
      </div>
      <div class="sort-bar">
        <label class="sort-field">
          <span class="sort-label">Sort</span>
          <select id="sort-field" class="sort-select" aria-label="Sort by">
            <option value="artist">Artist</option>
            <option value="title">Title</option>
            <option value="year">Year</option>
            <option value="rating">Rating</option>
          </select>
        </label>
        <button
          id="sort-dir"
          class="sort-dir"
          type="button"
          aria-pressed="false"
          aria-label="Sort direction: ascending"
        >
          ↑ Asc
        </button>
      </div>
      <ul id="record-list" class="record-list"></ul>
    </main>
  </body>
</html>
