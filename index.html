<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Collection</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <header class="app-header">
      <h1>Collection</h1>
      <span id="record-count" class="record-count" aria-label="record count">0</span>
    </header>
    <main>
      <div class="search-bar">
        <input
          id="search-input"
          class="search-input"
          type="search"
          placeholder="Search artist or title"
          aria-label="Search artist or title"
          autocomplete="off"
        />
      </div>
      <div class="sort-bar">
        <label class="sort-field">
          <span class="sort-label">Sort</span>
          <select id="sort-field" class="sort-select" aria-label="Sort by">
            <option value="artist">Artist</option>
            <option value="title">Title</option>
            <option value="year">Year</option>
            <option value="rating">Rating</option>
          </select>
        </label>
        <button
          id="sort-dir"
          class="sort-dir"
          type="button"
          aria-pressed="false"
          aria-label="Sort direction: ascending"
        >
          ↑ Asc
        </button>
        <button
          id="filter-open"
          class="filter-open"
          type="button"
          aria-haspopup="dialog"
          aria-controls="filter-sheet"
          aria-expanded="false"
        >
          Filter
        </button>
      </div>
      <div id="filter-chips" class="filter-chips" hidden></div>
      <ul id="record-list" class="record-list"></ul>
      <section
        id="filter-sheet"
        class="filter-sheet"
        role="dialog"
        aria-modal="true"
        aria-labelledby="filter-sheet-title"
        hidden
      >
        <header class="filter-sheet-header">
          <h2 id="filter-sheet-title">Filters</h2>
          <button
            id="filter-close"
            class="filter-close"
            type="button"
            aria-label="Close filters"
          >
            Close
          </button>
        </header>
        <div id="filter-sheet-body" class="filter-sheet-body"></div>
        <footer class="filter-sheet-footer">
          <button id="filter-clear" class="filter-clear" type="button">
            Clear all
          </button>
          <button id="filter-done" class="filter-done" type="button">
            Done
          </button>
        </footer>
      </section>
    </main>
  </body>
</html>
