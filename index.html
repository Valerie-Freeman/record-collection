<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/list.css" />
    <link rel="stylesheet" href="styles/filters.css" />
    <link rel="stylesheet" href="styles/detail.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <header class="app-header">
      <h1>Collection</h1>
      <span id="record-count" class="record-count" aria-label="record count"
        >0</span
      >
    </header>
    <main>
      <div class="top-bar">
        <input
          id="search-input"
          class="search-input"
          type="search"
          placeholder="Search..."
          aria-label="Search artist or title"
          autocomplete="off"
        />
        <button
          id="surprise-me"
          class="surprise-btn"
          type="button"
          aria-describedby="surprise-hint"
        >
          <span>Random</span>
          <span class="surprise-play" aria-hidden="true">▶</span>
        </button>
      </div>
      <p id="surprise-hint" class="surprise-hint" hidden>
        Adjust filters to get a pick.
      </p>
      <div class="sort-bar">
        <label class="sort-field">
          <span class="sort-label">Sort</span>
          <select id="sort-field" class="sort-select" aria-label="Sort by">
            <option value="artist">Artist</option>
            <option value="title">Title</option>
            <option value="year">Year</option>
            <option value="rating">Rating</option>
          </select>
        </label>
        <button
          id="sort-dir"
          class="sort-dir"
          type="button"
          aria-pressed="false"
          aria-label="Sort direction: ascending"
        >
          ↑ Asc
        </button>
        <button
          id="filter-open"
          class="filter-open"
          type="button"
          aria-haspopup="dialog"
          aria-controls="filter-sheet"
          aria-expanded="false"
        >
          Filter
        </button>
      </div>
      <div id="filter-chips" class="filter-chips" hidden></div>
      <ul id="record-list" class="record-list"></ul>
      <div id="empty-state" class="empty-state" hidden>
        <p class="empty-state-message">No records match.</p>
        <button id="empty-clear" class="empty-clear" type="button">
          Clear filters
        </button>
      </div>
      <section
        id="filter-sheet"
        class="filter-sheet"
        role="dialog"
        aria-modal="true"
        aria-labelledby="filter-sheet-title"
        hidden
      >
        <header class="filter-sheet-header">
          <h2 id="filter-sheet-title">Filters</h2>
          <button
            id="filter-close"
            class="filter-close"
            type="button"
            aria-label="Close filters"
          >
            ✕
          </button>
        </header>
        <div id="filter-sheet-body" class="filter-sheet-body"></div>
        <footer class="filter-sheet-footer">
          <button id="filter-clear" class="filter-clear" type="button">
            Clear all
          </button>
        </footer>
      </section>
    </main>
    <section
      id="detail-sheet"
      class="detail-sheet"
      role="dialog"
      aria-modal="true"
      aria-labelledby="detail-title"
      hidden
    >
      <header class="detail-header">
        <button
          id="detail-close"
          class="detail-close"
          type="button"
          aria-label="Close detail"
        >
          ✕
        </button>
      </header>
      <div id="detail-body" class="detail-body"></div>
    </section>
  </body>
</html>
